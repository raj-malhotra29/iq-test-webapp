<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQ Test - Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 30px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      color: #fff;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    .tab {
      padding: 12px 30px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
    }
    .tab.active {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #1a1a2e;
      font-weight: 600;
    }
    .tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .card h2 {
      color: #fff;
      font-size: 1.4em;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }
    .score-item .score {
      font-size: 1.5em;
      color: #4facfe;
      font-weight: 600;
    }
    .score-item .date {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9em;
    }
    .delete-btn {
      background: rgba(255, 107, 107, 0.2);
      border: none;
      color: #ff6b6b;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
      margin-left: 15px;
    }
    .delete-btn:hover {
      background: rgba(255, 107, 107, 0.4);
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }
    .leaderboard-item.top-3 {
      background: rgba(79, 172, 254, 0.15);
      border: 1px solid rgba(79, 172, 254, 0.3);
    }
    .leaderboard-item .rank {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      font-weight: 600;
      margin-right: 15px;
    }
    .leaderboard-item.top-3 .rank {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #1a1a2e;
    }
    .leaderboard-item .name {
      flex: 1;
      font-size: 1.1em;
    }
    .leaderboard-item .score {
      font-size: 1.3em;
      color: #4facfe;
      font-weight: 600;
    }
    .current-score {
      text-align: center;
      padding: 30px;
    }
    .current-score .score {
      font-size: 5em;
      color: #4facfe;
      margin: 20px 0;
      text-shadow: 0 0 50px rgba(79, 172, 254, 0.5);
    }
    .current-score .label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.2em;
    }
    .no-data {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      padding: 40px;
    }
    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #1a1a2e;
      margin-top: 20px;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
    }
    .nav-links {
      text-align: center;
      margin-top: 20px;
    }
    .nav-links a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      margin: 0 15px;
      font-size: 0.9em;
    }
    .nav-links a:hover {
      color: #4facfe;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showSection('current')">Current Score</button>
      <button class="tab" onclick="showSection('history')">My History</button>
      <button class="tab" onclick="showSection('leaderboard')">Leaderboard</button>
    </div>

    <div class="section active" id="currentSection">
      <div class="card">
        <div class="current-score" id="currentScore">
          <p class="no-data">Loading...</p>
        </div>
      </div>
    </div>

    <div class="section" id="historySection">
      <div class="card">
        <h2>Your Test History</h2>
        <div id="historyList">
          <p class="no-data">Loading...</p>
        </div>
      </div>
    </div>

    <div class="section" id="leaderboardSection">
      <div class="card">
        <h2>Top Performers</h2>
        <div id="leaderboardList">
          <p class="no-data">Loading...</p>
        </div>
      </div>
    </div>

    <div class="nav-links">
      <a href="/" onclick="goHome()">Home</a>
      <a href="/quiz.html">Take Test</a>
    </div>
  </div>

  <script>
    let currentUser = null;

    function init() {
      const userData = localStorage.getItem('iqtest_user');
      if (!userData) {
        window.location.href = '/';
        return;
      }
      currentUser = JSON.parse(userData);
      loadData();
    }

    async function loadData() {
      await Promise.all([loadCurrentScore(), loadHistory(), loadLeaderboard()]);
    }

    async function loadCurrentScore() {
      try {
        const response = await fetch(`/api/users/${currentUser.name}/scores`);
        const data = await response.json();
        const container = document.getElementById('currentScore');
        
        if (data.scores && data.scores.length > 0) {
          const latest = data.scores[0];
          container.innerHTML = `
            <p class="label">Latest Score</p>
            <p class="score">${latest.score}/${latest.total_questions}</p>
          `;
        } else {
          container.innerHTML = `<p class="no-data">No test taken yet</p>`;
        }
      } catch (err) {
        document.getElementById('currentScore').innerHTML = `<p class="no-data">Error loading score</p>`;
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch(`/api/users/${currentUser.name}/scores`);
        const data = await response.json();
        const container = document.getElementById('historyList');
        
        if (data.scores && data.scores.length > 0) {
          let html = '';
          data.scores.forEach((s, i) => {
            const date = new Date(s.completed_at).toLocaleDateString();
            html += `
              <div class="score-item">
                <div>
                  <div class="score">${s.score}/${s.total_questions}</div>
                  <div class="date">${date}</div>
                </div>
                <button class="delete-btn" onclick="deleteScore(${s.id})">Delete</button>
              </div>
            `;
          });
          container.innerHTML = html;
        } else {
          container.innerHTML = `<p class="no-data">No test history yet</p>`;
        }
      } catch (err) {
        document.getElementById('historyList').innerHTML = `<p class="no-data">Error loading history</p>`;
      }
    }

    async function deleteScore(scoreId) {
      if (!confirm('Are you sure you want to delete this score?')) return;
      try {
        await fetch(`/api/users/${currentUser.name}/scores/${scoreId}`, { method: 'DELETE' });
        loadHistory();
      } catch (err) {
        alert('Failed to delete score');
      }
    }

    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/leaderboard');
        const data = await response.json();
        const container = document.getElementById('leaderboardList');
        
        if (data.leaderboard && data.leaderboard.length > 0) {
          let html = '';
          data.leaderboard.forEach((entry, i) => {
            const rankClass = i < 3 ? 'top-3' : '';
            html += `
              <div class="leaderboard-item ${rankClass}">
                <div class="rank">${i + 1}</div>
                <div class="name">${entry.name}</div>
                <div class="score">${entry.best_score}/${entry.total_questions}</div>
              </div>
            `;
          });
          container.innerHTML = html;
        } else {
          container.innerHTML = `<p class="no-data">No scores yet</p>`;
        }
      } catch (err) {
        document.getElementById('leaderboardList').innerHTML = `<p class="no-data">Error loading leaderboard</p>`;
      }
    }

    function showSection(section) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(section + 'Section').classList.add('active');
    }

    function goHome() {
      window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
